<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contratos Gamatel</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0a1628;--navy2:#0f1e38;--navy3:#162847;--navy4:#1d3460;
  --blue:#2563eb;--blue2:#3b82f6;--glow:rgba(37,99,235,.28);
  --gold:#f0b429;
  --danger:#ef4444;--danger-bg:rgba(239,68,68,.12);
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,.12);
  --ok:#10b981;--ok-bg:rgba(16,185,129,.12);
  --text:#e2eaf8;--text2:#8fa3c8;
  --border:rgba(37,99,235,.18);--border2:rgba(37,99,235,.3);
  --surface:rgba(15,30,56,.8);--surface2:rgba(22,40,71,.9);
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--navy);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%,rgba(37,99,235,.18) 0%,transparent 70%),
    linear-gradient(rgba(37,99,235,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(37,99,235,.03) 1px,transparent 1px);
  background-size:100% 100%,44px 44px,44px 44px;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--navy)}
::-webkit-scrollbar-thumb{background:var(--navy4);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--blue)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}60%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}

/* HEADER */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(9,18,35,.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 32px;height:66px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo-wrap{
  width:44px;height:44px;border-radius:10px;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:#fff;
  box-shadow:0 0 0 2px var(--glow),0 4px 16px rgba(37,99,235,.25);
  cursor:pointer;overflow:hidden;flex-shrink:0;
  transition:box-shadow .25s,transform .18s;
  position:relative;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
.brand-name{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--text);letter-spacing:.01em}
.h-actions{display:flex;gap:9px;align-items:center}

/* BUTTONS */
.btn{
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  border:none;cursor:pointer;border-radius:8px;padding:9px 16px;
  display:inline-flex;align-items:center;gap:7px;
  transition:all .18s;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--blue),#1a45c8);
  color:#fff;box-shadow:0 2px 14px rgba(37,99,235,.38);
}
.btn-primary:hover{background:linear-gradient(135deg,var(--blue2),var(--blue));box-shadow:0 4px 22px rgba(37,99,235,.55);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--blue2);background:var(--glow)}

/* TABS */
.tabs{
  background:rgba(9,18,35,.85);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 32px;display:flex;overflow-x:auto;
}
.tab{
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  padding:15px 20px;border:none;background:none;cursor:pointer;
  color:var(--text2);border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:8px;white-space:nowrap;
  transition:color .18s,border-color .18s;
}
.tab.active{color:var(--blue2);border-bottom-color:var(--blue2)}
.badge{
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:20px;min-width:20px;text-align:center;
  background:var(--navy4);color:var(--text2);
}
.badge.red{background:rgba(239,68,68,.2);color:var(--danger);animation:pulseDot 2.2s infinite}
.badge.blue{background:rgba(37,99,235,.2);color:var(--blue2)}

/* LAYOUT */
main{padding:28px 32px;max-width:1480px;margin:0 auto}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:26px}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;display:flex;flex-direction:column;gap:4px;
  animation:fadeUp .4s ease both;
}
.kpi-lbl{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
.kpi-val{font-family:'Fraunces',serif;font-size:36px;font-weight:600;line-height:1.05}
.kpi.red .kpi-val{color:var(--danger)}
.kpi.green .kpi-val{color:var(--ok)}
.kpi.blue .kpi-val{color:var(--blue2)}

/* TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
thead tr{background:rgba(15,30,56,.95);border-bottom:1px solid var(--border)}
th{
  font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text2);padding:13px 16px;text-align:left;font-weight:500;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(22,40,71,.6)}
td{padding:13px 16px;font-size:13px;vertical-align:middle}

/* STATUS PILLS */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:10.5px;font-weight:500;
  padding:3px 10px;border-radius:5px;white-space:nowrap;
}
.pill-red{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.pill-amber{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.pill-green{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(16,185,129,.2)}
.pill-grey{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border)}

/* ACTIONS */
.acts{display:flex;gap:6px;justify-content:flex-end}
.ibtn{
  background:none;border:1px solid var(--border);border-radius:6px;
  color:var(--text2);cursor:pointer;padding:5px 9px;font-size:13px;
}
.ibtn:hover{color:var(--text);border-color:var(--blue2)}
.ibtn.del:hover{color:var(--danger);border-color:var(--danger)}

/* OVERLAY / MODAL */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(5,12,26,.82);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--navy2);border:1px solid var(--border2);border-radius:14px;
  width:100%;max-width:540px;padding:26px;
  box-shadow:0 24px 60px rgba(0,0,0,.65);
}
.modal-title{font-family:'Fraunces',serif;font-size:21px;color:var(--text);margin-bottom:20px}
.fg{margin-bottom:14px}
.flabel{display:block;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--text2);margin-bottom:7px}
.finput{
  width:100%;background:rgba(9,18,35,.8);border:1px solid var(--border);border-radius:8px;
  padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* TOAST */
.toast{
  position:fixed;bottom:22px;right:22px;z-index:400;
  background:var(--navy2);border:1px solid var(--border2);border-radius:10px;
  padding:13px 18px;font-size:13px;color:var(--text);
  box-shadow:0 10px 36px rgba(0,0,0,.55);
  transform:translateY(80px);opacity:0;transition:all .28s;
}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo-wrap" onclick="document.getElementById('logo-file').click()">
      <img id="logo-img" src="">
      <span id="logo-letters">G</span>
    </div>
    <div class="brand-info">
      <div class="brand-name">Gamatel Contratos</div>
    </div>
  </div>
  <div class="h-actions">
    <button class="btn btn-primary" onclick="openModal()">
      <span>+ Novo Cadastro</span>
    </button>
    <button class="btn btn-ghost" onclick="exportToExcel()">Exportar Excel</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-all" onclick="setFilter('all')">Todos <span class="badge blue" id="count-all">0</span></button>
  <button class="tab" id="tab-active" onclick="setFilter('active')">Ativos <span class="badge blue" id="count-active">0</span></button>
  <button class="tab" id="tab-expired" onclick="setFilter('expired')">Vencidos <span class="badge red" id="count-expired">0</span></button>
</div>

<main>
  <div class="kpis">
    <div class="kpi blue">
      <span class="kpi-lbl">Total Geral</span>
      <span class="kpi-val" id="kpi-total">0</span>
    </div>
    <div class="kpi green">
      <span class="kpi-lbl">Contratos Ativos</span>
      <span class="kpi-val" id="kpi-active">0</span>
    </div>
    <div class="kpi red">
      <span class="kpi-lbl">Vencidos/Críticos</span>
      <span class="kpi-val" id="kpi-expired">0</span>
    </div>
  </div>

  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>CNPJ</th>
            <th>Nº Contrato</th>
            <th>Vencimento</th>
            <th>Prazo</th>
            <th>Status</th>
            <th style="text-align:right">Ações</th>
          </tr>
        </thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 class="modal-title" id="modal-title">Novo Contrato</h2>
    <form id="contract-form" onsubmit="event.preventDefault(); saveContract();">
      <div class="fg">
        <label class="flabel">Nome do Cliente *</label>
        <input type="text" id="f-nome" class="finput" required placeholder="Nome completo ou Razão Social">
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">CNPJ</label>
          <input type="text" id="f-cnpj" class="finput" placeholder="00.000.000/0000-00">
        </div>
        <div class="fg">
          <label class="flabel">Nº do Contrato</label>
          <input type="text" id="f-num" class="finput" placeholder="Ex: 2024-001">
        </div>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flabel">Data de Vencimento</label>
          <input type="date" id="f-data" class="finput">
        </div>
        <div class="fg">
          <label class="flabel">Status Inicial</label>
          <select id="f-status" class="finput">
            <option value="Ativo">Ativo</option>
            <option value="Pendente">Pendente</option>
            <option value="Vencido">Vencido</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="flabel">Observações</label>
        <textarea id="f-obs" class="finput" style="height:80px" placeholder="Alguma informação adicional?"></textarea>
      </div>
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Dados</button>
      </div>
    </form>
  </div>
</div>

<input type="file" id="logo-file" style="display:none" accept="image/*" onchange="swapLogo(event)">
<div id="toast" class="toast">Cadastro atualizado!</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
let contracts = JSON.parse(localStorage.getItem('gamatel_db')) || [];
let editingId = null;
let currentFilter = 'all';

function saveContract() {
    const data = {
        id: editingId || Date.now(),
        nome: document.getElementById('f-nome').value,
        cnpj: document.getElementById('f-cnpj').value,
        num: document.getElementById('f-num').value,
        data: document.getElementById('f-data').value, // Pode ser vazio
        status: document.getElementById('f-status').value,
        obs: document.getElementById('f-obs').value
    };

    if (editingId) {
        contracts = contracts.map(c => c.id === editingId ? data : c);
    } else {
        contracts.push(data);
    }

    localStorage.setItem('gamatel_db', JSON.stringify(contracts));
    closeModal();
    render();
    showToast();
}

function render() {
    const tbody = document.getElementById('t-body');
    tbody.innerHTML = '';

    let filtered = contracts;
    if (currentFilter === 'active') filtered = contracts.filter(c => c.status === 'Ativo');
    if (currentFilter === 'expired') filtered = contracts.filter(c => {
        if(!c.data) return false;
        return new Date(c.data) < new Date().setHours(0,0,0,0);
    });

    filtered.forEach(c => {
        let prazoTxt = "Sem data";
        let prazoClass = "pill-grey";

        if (c.data) {
            const diff = Math.ceil((new Date(c.data) - new Date()) / (86400000));
            prazoTxt = diff < 0 ? `Vencido (${Math.abs(diff)}d)` : `${diff} dias`;
            prazoClass = diff < 0 ? 'pill-red' : (diff < 15 ? 'pill-amber' : 'pill-green');
        }

        tbody.innerHTML += `
            <tr>
                <td style="font-weight:600">${c.nome}</td>
                <td style="color:var(--text2)">${c.cnpj || '---'}</td>
                <td style="font-family:monospace; color:var(--blue2)">${c.num || '---'}</td>
                <td>${c.data ? new Date(c.data).toLocaleDateString('pt-BR') : 'Pendente'}</td>
                <td><span class="pill ${prazoClass}">${prazoTxt}</span></td>
                <td><span class="pill ${c.status === 'Ativo' ? 'pill-green' : 'pill-amber'}">${c.status}</span></td>
                <td class="acts">
                    <button class="ibtn" onclick="openModal(${c.id})">Editar</button>
                    <button class="ibtn del" onclick="deleteItem(${c.id})">Excluir</button>
                </td>
            </tr>
        `;
    });
    updateKPIs();
}

function deleteItem(id) {
    if (confirm('Excluir este contrato?')) {
        contracts = contracts.filter(c => c.id !== id);
        localStorage.setItem('gamatel_db', JSON.stringify(contracts));
        render();
    }
}

function openModal(id = null) {
    editingId = id;
    const form = document.getElementById('contract-form');
    form.reset();
    document.getElementById('modal-title').innerText = id ? "Editar Contrato" : "Novo Contrato";

    if (id) {
        const c = contracts.find(x => x.id === id);
        document.getElementById('f-nome').value = c.nome;
        document.getElementById('f-cnpj').value = c.cnpj;
        document.getElementById('f-num').value = c.num;
        document.getElementById('f-data').value = c.data;
        document.getElementById('f-status').value = c.status;
        document.getElementById('f-obs').value = c.obs;
    }
    document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${f}`).classList.add('active');
    render();
}

function updateKPIs() {
    const total = contracts.length;
    const active = contracts.filter(c => c.status === 'Ativo').length;
    const expired = contracts.filter(c => c.data && new Date(c.data) < new Date()).length;

    document.getElementById('kpi-total').innerText = total;
    document.getElementById('kpi-active').innerText = active;
    document.getElementById('kpi-expired').innerText = expired;
    document.getElementById('count-all').innerText = total;
    document.getElementById('count-active').innerText = active;
    document.getElementById('count-expired').innerText = expired;
}

function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function exportToExcel() {
    const ws = XLSX.utils.json_to_sheet(contracts);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Contratos");
    XLSX.writeFile(wb, "Contratos_Gamatel.xlsx");
}

function swapLogo(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
        document.getElementById('logo-img').src = ev.target.result;
        document.getElementById('logo-img').style.display = 'block';
        document.getElementById('logo-letters').style.display = 'none';
        localStorage.setItem('logo_gamatel', ev.target.result);
    };
    reader.readAsDataURL(file);
}

window.onload = () => {
    const savedLogo = localStorage.getItem('logo_gamatel');
    if(savedLogo) {
        document.getElementById('logo-img').src = savedLogo;
        document.getElementById('logo-img').style.display = 'block';
        document.getElementById('logo-letters').style.display = 'none';
    }
    render();
};
</script>
</body>
</html>
